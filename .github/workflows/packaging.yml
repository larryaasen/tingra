# Packaging / release CI for tingra-cli (see CLAUDE.md "Toolchain & CI" →
# Packaging, and docs/CLI.md "Distribution"). Builds the Apple Silicon (arm64)
# release binary, verifies identity/entitlements/embedded plist, and — when the
# signing secrets are configured — produces the Developer ID signed, notarized
# zip and stapled .pkg and attaches them to the GitHub release.
#
# Runs on a version tag (`v*`) or manually. Signing/notarization secrets:
#   TINGRA_SIGN_ID, TINGRA_INSTALLER_SIGN_ID, TINGRA_NOTARY_PROFILE, and the
#   base64 signing certificate + password below. Absent secrets => the job
#   still builds, verifies, and uploads an UNSIGNED artifact (dev only), so the
#   packaging path is exercised on every tag even before signing is set up.
#
# The toolchain floor is pinned exactly as in ci.yml.

name: Packaging

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

jobs:
  package:
    name: Build, sign & notarize (arm64)
    runs-on: macos-26
    # `secrets` cannot be used in a step `if:` directly, so surface a presence
    # flag through job env for the signing steps to gate on. (job-level env can
    # read `secrets`; workflow-level env cannot.)
    env:
      HAS_SIGNING: ${{ secrets.TINGRA_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v4

      # Import the Developer ID Application certificate into a throwaway
      # keychain so codesign can find it. Skipped when the secret is absent.
      - name: Import signing certificate
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          CERT_P12: ${{ secrets.TINGRA_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.TINGRA_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/tingra-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, notarize & package
        env:
          TINGRA_SIGN_ID: ${{ secrets.TINGRA_SIGN_ID }}
          TINGRA_INSTALLER_SIGN_ID: ${{ secrets.TINGRA_INSTALLER_SIGN_ID }}
          TINGRA_NOTARY_PROFILE: ${{ secrets.TINGRA_NOTARY_PROFILE }}
        run: scripts/package-cli.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tingra-cli-arm64
          path: |
            dist/*.zip
            dist/*.pkg

      # Attach the signed artifacts to the release when triggered by a tag.
      - name: Attach to release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.pkg
